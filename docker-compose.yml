version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: azdome-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-azdome}
      MYSQL_USER: ${DB_USER:-azdome}
      MYSQL_PASSWORD: ${DB_PASS:-azdome123}
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-3306}:3306"

  dashboard:
    build: .
    container_name: azdome-dashboard
    restart: unless-stopped
    ports:
      - "${PORT:-8899}:8899"
    environment:
      PORT: 8899
      DB_HOST: db
      DB_USER: ${DB_USER:-azdome}
      DB_PASS: ${DB_PASS:-azdome123}
      DB_NAME: ${DB_NAME:-azdome}
    volumes:
      - ./media:/app/media
    depends_on:
      - db
